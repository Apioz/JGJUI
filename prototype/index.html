<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>延安东路300号 - 交互原型</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/icons.css" />
  <link rel="stylesheet" href="css/xiaoyu.css" />
</head>
<body>
  <div class="prototype-shell">
    <aside class="sidebar">
      <h1>智慧园区<br/>交互原型</h1>
      <p class="sidebar-desc">完整登录流程 + 项目切换 + 食堂/能源数据总览 + 通讯录管理。</p>
      <div class="platform-switch-section">
        <div class="platform-switch-title">切换系统</div>
        <div class="platform-switch-list">
          <a href="../dp/index.html" class="platform-switch-item">🖥️ 大屏</a>
          <a href="../dp/middle-platform.html" class="platform-switch-item">📊 中台</a>
          <div class="platform-switch-item active">📱 小程序</div>
          <a href="../dp/foundation-platform.html" class="platform-switch-item">🏗️ 底座</a>
        </div>
      </div>
      <div class="guide-list">
        <div class="guide-item" onclick="App.goLogin()">🔐 登录页</div>
        <div class="guide-item" onclick="App.enterApp('p1')">🏠 进入首页</div>
        <div class="guide-item" onclick="App.openSubPage('assetData')">🏢 资产数据总览</div>
        <div class="guide-item" onclick="App.openSubPage('canteenData')">🍽️ 食堂数据总览</div>
        <div class="guide-item" onclick="App.openSubPage('energyData')">⚡ 能源数据总览</div>
      </div>
      <div class="guide-tip">💡 登录后选择项目进入，首页右上角可切换项目，数据随项目变化。</div>
    </aside>

    <div class="phone-frame">
      <div id="status-bar" class="status-bar">
        <span>12:00</span>
        <div class="status-bar-actions">
          <div class="phone-platform-wrap hidden" id="phone-platform-wrap">
            <button class="phone-platform-btn" type="button" onclick="App.togglePhonePlatformMenu(event)" title="切换系统" aria-label="切换系统">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </button>
            <div class="phone-platform-menu hidden" id="phone-platform-menu">
              <a href="../dp/index.html" class="phone-platform-item">大屏</a>
              <a href="../dp/middle-platform.html" class="phone-platform-item">中台</a>
              <span class="phone-platform-item active">小程序</span>
              <a href="../dp/foundation-platform.html" class="phone-platform-item">底座</a>
            </div>
          </div>
          <span class="status-icons">📶 🔋</span>
        </div>
      </div>

      <div id="nav-bar" class="nav-bar hidden">
        <button class="nav-back" onclick="App.handleBack()">‹ 返回</button>
        <span id="nav-title" class="nav-title"></span>
        <span class="nav-placeholder"></span>
      </div>

      <div id="screen" class="screen"></div>

      <div id="tab-bar" class="tab-bar hidden">
        <div class="tab-item" data-tab="home" onclick="App.switchTab('home')">
          <span class="tab-icon-slot"></span><span>首页</span>
        </div>
        <div class="tab-item" data-tab="collab" onclick="App.switchTab('collab')">
          <span class="tab-icon-slot"></span><span>协作</span>
        </div>
        <div class="tab-item" data-tab="data" onclick="App.switchTab('data')">
          <span class="tab-icon-slot"></span><span>数据</span>
        </div>
        <div class="tab-item" data-tab="mine" onclick="App.switchTab('mine')">
          <span class="tab-icon-slot"></span><span>我的</span>
        </div>
      </div>

      <div id="xiaoyu-fab" class="xiaoyu-fab hidden" onclick="App.openSubPage('xiaoyu')">
        <div id="xiaoyu-fab-avatar" class="xiaoyu-fab-avatar"></div>
        <span class="xiaoyu-fab-label">小禹</span>
      </div>
    </div>
  </div>

  <div id="project-mask" class="mask" onclick="App.toggleProjectPicker(false)">
    <div class="picker-panel" onclick="event.stopPropagation()">
      <div class="picker-title">切换项目</div>
      <div id="project-list"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="../dp/js/public-warehouse-data.js"></script>
  <script src="../dp/js/foundation-user-data.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
